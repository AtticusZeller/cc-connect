name: Upstream Sync

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at 00:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/chenhg5/cc-connect.git

      - name: Fetch upstream changes
        run: git fetch upstream main

      - name: Check for updates
        id: check
        run: |
          UPSTREAM_HASH=$(git rev-parse upstream/main)
          LOCAL_HASH=$(git rev-parse HEAD)
          if [ "$UPSTREAM_HASH" = "$LOCAL_HASH" ]; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Attempt Rebase/Merge
        if: steps.check.outputs.updated == 'true'
        run: |
          # Try to merge upstream main into our main
          # We prefer ours for go.mod and package.json to keep @atticux scope
          git merge upstream/main --allow-unrelated-histories -m "chore: sync with upstream" || true
          
          # Force fix go.mod and package.json if conflicted
          git checkout --ours go.mod go.sum npm/package.json npm/install.js
          go mod tidy
          
          # Fix all imports again to AtticusZeller scope
          find . -name "*.go" -exec sed -i 's|github.com/chenhg5/cc-connect|github.com/AtticusZeller/cc-connect|g' {} +
          
          git add .
          git commit -m "chore: resolve sync conflicts and fix module paths" || echo "No conflicts to resolve"

      - name: Push changes
        if: steps.check.outputs.updated == 'true'
        run: git push origin main
